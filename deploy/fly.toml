kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  AGENT_BRIDGE_HOST = "0.0.0.0"
  AGENT_BRIDGE_PORT = "8787"
  NODE_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    name = "ready"
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    path = "/readyz"
    timeout = "3s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
