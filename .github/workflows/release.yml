name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to verify and publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: verify release package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - name: Check tag and package versions
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          package_version=$(node -p "require('./package.json').version")
          test "${RELEASE_TAG}" = "v${package_version}"
      - name: Check release commit is on main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$(git rev-parse HEAD)" "origin/main"
      - name: Build and pack
        run: npm pack --pack-destination "$RUNNER_TEMP"
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error

  publish:
    name: publish npm package
    needs: package
    if: (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch') && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: package
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install OIDC-capable npm
        run: npm install --global npm@latest
      - name: Publish with provenance
        shell: bash
        run: |
          shopt -s nullglob
          tarballs=(./package/*.tgz)
          test "${#tarballs[@]}" -eq 1
          npm publish "${tarballs[0]}" --access public --provenance
