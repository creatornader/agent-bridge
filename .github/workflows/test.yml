name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-unix:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run check

  windows-preflight:
    name: windows contract preflight
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:windows:contract

  test-windows:
    name: test (windows-latest, node ${{ matrix.node }})
    needs: windows-preflight
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Require the Windows contract
        if: needs.windows-preflight.result != 'success'
        run: exit 1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run check:windows

  postgres-preflight:
    name: postgres migration preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: agent_bridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_bridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGENT_BRIDGE_TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agent_bridge_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:postgres:contract

  postgres:
    name: postgres ${{ matrix.postgres }} integration
    runs-on: ubuntu-latest
    needs: postgres-preflight
    if: ${{ always() }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: agent_bridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_bridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AGENT_BRIDGE_TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agent_bridge_test
    steps:
      - name: Require the PostgreSQL migration contract
        if: needs.postgres-preflight.result != 'success'
        run: exit 1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:postgres:contract
      - name: Native DR on matching PostgreSQL major
        env:
          AGENT_BRIDGE_POSTGRES_NATIVE_DR_INTEGRATION: "1"
          AGENT_BRIDGE_TEST_POSTGRES_MAJOR: ${{ matrix.postgres }}
        run: npx vitest run test/postgres-native-dr-integration.test.ts

  compose:
    name: compose gateway smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Prove authenticated gateway persistence
        run: ./scripts/compose-smoke.sh

  package:
    name: package install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Pack from a clean build state
        run: |
          rm -rf dist
          npm pack --pack-destination "$RUNNER_TEMP"
      - name: Install and run the packed CLI
        working-directory: ${{ runner.temp }}
        run: |
          mkdir -m 700 package-smoke
          cd package-smoke
          npm init -y
          npm install ../creatornader-agent-bridge-*.tgz
          mkdir -m 700 smoke-home
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" node --input-type=module -e "import { BridgeService, SQLiteBridgeStore } from '@creatornader/agent-bridge'; import { decodePortableArchive } from '@creatornader/agent-bridge/archive'; import { verifyNativeDrBundle } from '@creatornader/agent-bridge/dr'; if (typeof BridgeService !== 'function' || typeof SQLiteBridgeStore !== 'function' || typeof decodePortableArchive !== 'function' || typeof verifyNativeDrBundle !== 'function') process.exit(1)"
          package_version="$(node -p "require('./node_modules/@creatornader/agent-bridge/package.json').version")"
          test "$(env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge --version)" = "$package_version"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge demo
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge owner help
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" AGENT_BRIDGE_PROVIDER=local AGENT_BRIDGE_DB="$PWD/archive-source.sqlite3" ./node_modules/.bin/agent-bridge send --source pack-smoke portable
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge archive export --provider local --workspace default --db "$PWD/archive-source.sqlite3" --output "$PWD/archive.ndjson"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge archive verify --file "$PWD/archive.ndjson"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" AGENT_BRIDGE_PROVIDER=local AGENT_BRIDGE_DB="$PWD/archive-target.sqlite3" ./node_modules/.bin/agent-bridge status --as bootstrap
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge archive import --provider local --db "$PWD/archive-target.sqlite3" --file "$PWD/archive.ndjson"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge archive import --provider local --db "$PWD/archive-target.sqlite3" --file "$PWD/archive.ndjson" --apply
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge dr backup --provider local --source "$PWD/archive-source.sqlite3" --output "$PWD/native.abdr"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge dr verify --provider local --bundle "$PWD/native.abdr"
          env -i HOME="$PWD/smoke-home" PATH="$PATH" TMPDIR="$RUNNER_TEMP" ./node_modules/.bin/agent-bridge dr restore --provider local --bundle "$PWD/native.abdr" --target "$PWD/native-target.sqlite3"
