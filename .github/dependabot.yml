# Dependabot config for agent-bridge.
#
# Tracks Docker base images, GitHub Actions, npm packages, and pre-commit hooks.
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    # Keep production images on the selected LTS line. Move Node majors through
    # a deliberate runtime migration after the new line reaches LTS.
    ignore:
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # pre-commit ecosystem (Layer 1 of the pin-drift fix, 2026-05-17).
  # Tracks rev fields in .pre-commit-config.yaml, primarily
  # creatornader/textleaks + creatornader/oss-twin hooks. Without this,
  # internal tool releases don't auto-PR into consumer repos and pins
  # drift silently. Audit at: ~/.claude/scripts/oss-pin-audit.sh
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      pre-commit:
        patterns:
          - "*"
