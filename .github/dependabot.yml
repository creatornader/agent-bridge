# Dependabot config for agent-bridge.
#
# Tracks two ecosystems:
# 1. github-actions — weekly grouped PR for action version drift,
#    matching the pattern across the rest of the OSS stack
# 2. npm — Node.js package security updates (MCP server is an npm
#    package; the bash CLI uses no npm deps directly)
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      npm-deps:
        patterns:
          - "*"
